name: Fetch Daily Papers

on:
  schedule:
    # runs at 08:00 UTC daily (HF daily papers are typically available by then)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Specific date to fetch (YYYY-MM-DD). Leave empty for today.'
        required: false
        type: string
      backfill:
        description: 'Number of days to backfill (from the date above or today)'
        required: false
        type: number
        default: 0

permissions:
  contents: write

jobs:
  fetch-papers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch papers
        run: |
          DATE_ARG=""
          BACKFILL_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="${{ github.event.inputs.date }}"
          fi
          if [ -n "${{ github.event.inputs.backfill }}" ] && [ "${{ github.event.inputs.backfill }}" != "0" ]; then
            BACKFILL_ARG="--backfill ${{ github.event.inputs.backfill }}"
          fi
          python scripts/fetch_papers.py $DATE_ARG $BACKFILL_ARG

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers/
          if git diff --cached --quiet; then
            echo "No new papers to commit."
          else
            DATE_DISPLAY="${{ github.event.inputs.date }}"
            if [ -z "$DATE_DISPLAY" ]; then
              DATE_DISPLAY="$(date -u +%Y-%m-%d)"
            fi
            git commit -m "papers: add daily papers for ${DATE_DISPLAY}"
            git push
          fi
